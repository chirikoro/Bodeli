    <text x="256" y="260" text-anchor="middle" dominant-baseline="central"
          font-family="'Helvetica Neue', 'Arial Black', sans-serif"
          font-weight="900" font-size="280" fill="#f5f5f5"
          letter-spacing="-8">B</text>
    <text x="256" y="400" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-weight="700" font-size="64" fill="#22c55e"
